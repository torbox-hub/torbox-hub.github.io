<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TorBox | Verification & Setup Hub</title>
    <style>
        :root {
            --bg: #0b0f17; /* По-мек, професионален тъмносин/сив фон */
            --card-bg: #131924; /* Открояващи се карти */
            --border: rgba(0, 255, 135, 0.08);
            --border-hover: rgba(0, 255, 135, 0.25);
            --text-main: #f3f4f6;
            --text-dim: #9ca3af;
            --torbox-green: #00ff87;
            --torbox-green-hover: #00e074;
            --accent-red: #f87171;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(0, 255, 135, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 0% 100%, rgba(156, 163, 175, 0.02) 0%, transparent 30%);
            color: var(--text-main);
            font-family: var(--font-stack);
            display: flex;
            justify-content: center;
            padding: 50px 20px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        .wrapper {
            max-width: 520px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 255, 135, 0.06);
            color: var(--torbox-green);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 255, 135, 0.15);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--torbox-green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--torbox-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 10px;
            color: #ffffff;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 15px;
        }

        .btn-main {
            display: block;
            background: linear-gradient(135deg, var(--torbox-green) 0%, var(--torbox-green-hover) 100%);
            color: #0b0f17;
            text-align: center;
            padding: 18px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            margin: 30px 0;
            transition: all 0.2s ease;
            box-shadow: 0 4px 20px rgba(0, 255, 135, 0.2);
            letter-spacing: 0.5px;
        }
