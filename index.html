<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TorBox | API & Bonus Deployment Node</title>
    <style>
        :root {
            --bcolor: #0b0f17;
            --ccolor: #131924;
            --gcolor: #00ff87;
            --ghover: #00e074;
            --rcolor: #f87171;
            --tcolor: #f3f4f6;
            --dcolor: #9ca3af;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bcolor);
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(0, 255, 135, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 0% 100%, rgba(156, 163, 175, 0.02) 0%, transparent 30%);
            color: var(--tcolor);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            padding: 50px 20px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        .main-holder {
            max-width: 520px;
            width: 100%;
        }

        .top-info {
            text-align: center;
            margin-bottom: 35px;
        }

        .alert-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 255, 135, 0.06);
            color: var(--gcolor);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 255, 135, 0.15);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .alert-dot {
            width: 8px;
            height: 8px;
            background-color: var(--gcolor);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--gcolor);
            animation: pulse-node 2s infinite;
        }

        @keyframes pulse-node {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 10px;
            color: #ffffff;
        }

        .sub-text {
            color: var(--dcolor);
            font-size: 15px;
        }

        .action-link {
            display: block;
            background: linear-gradient(135deg, var(--gcolor) 0%, var(--ghover) 100%);
            color: #0b0f17;
            text-align: center;
            padding: 18px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            margin: 25px 0;
            transition: all 0.2s ease;
            box-shadow: 0 4px 20px rgba(0, 255, 135, 0.2);
            letter-spacing: 0.5px;
        }

        .action-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 255, 135, 0.35);
        }

        .content-box {
            background: var(--ccolor);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h2 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--gcolor);
            margin-bottom: 16px;
            font-weight: 800;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 15px;
        }
