<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TorBox | API & Bonus Deployment Node</title>
    <style>
        :root {
            --bg: #03000a;
            --card-bg: rgba(13, 9, 29, 0.7);
            --border: rgba(123, 97, 255, 0.15);
            --border-hover: rgba(123, 97, 255, 0.4);
            --text-main: #f1f0f5;
            --text-dim: #928da0;
            --torbox-purple: #7b61ff;
            --torbox-cyan: #00f0ff;
            --accent-green: #00ff87;
            --accent-red: #ff3366;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(123, 97, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 240, 255, 0.1) 0%, transparent 40%);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        .wrapper {
            max-width: 540px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        /* ПРОМЕНЕНИЯТ БАДЖ СЪС ЗЕЛЕНАТА ТОЧКА ЗА РЕФЕРАЛА */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 255, 135, 0.06);
            color: var(--accent-green);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 255, 135, 0.15);
            letter-spacing: 0.5px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--accent-green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        h1 {
            font-size: 34px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff 0%, var(--text-dim) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 15px;
        }

        .btn-main {
            display: block;
            background: linear-gradient(135deg, var(--torbox-purple) 0%, #5236ff 100%);
            color: #fff;
            text-align: center;
            padding: 18px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            margin: 30px 0;
            transition: all 0.25s ease;
            box-shadow: 0 4px 20px rgba(123, 97, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            letter-spacing: 0.5px;
        }

        .btn-main:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(123, 97, 255, 0.5);
            background: linear-gradient(135deg, #8c75ff 0%, var(--torbox-purple) 100%);
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 26px;
            margin-bottom: 20px;
            transition: border 0.3s ease;
        }

        .card:hover {
            border: 1px solid var(--border-hover);
        }

        h2 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--torbox-purple);
            margin-bottom: 18px;
            font-weight: 800;
        }

        .bonus-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 15px;
        }

        .bonus-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .bonus-days {
            color: var(--accent-green);
            font-weight: 600;
        }

        .note-text {
            font-size: 13px;
            color: var(--text-dim);
            margin-top: 12px;
            font-style: italic;
        }

        .protocol-text strong {
            color: var(--accent-red);
        }

        .crypto-step {
            margin-bottom: 15px;
            font-size: 14px;
        }
        .crypto-step:last-child { margin-bottom: 0; }
        .step-num {
            color: var(--torbox-cyan);
            font-weight: 700;
            margin-right: 6px;
        }

        .accordion-item {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .accordion-trigger {
            width: 100%;
            background: none;
            border: none;
            color: #fff;
            text-align: left;
            padding: 18px 0;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .accordion-icon {
            color: var(--torbox-purple);
            font-size: 18px;
            transition: transform 0.2s ease;
        }

        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.25s cubic-bezier(0, 1, 0, 1);
            color: var(--text-dim);
            font-size: 14px;
            padding-bottom: 16px;
        }

        footer {
            margin-top: 40px;
            text-align: center;
            font-size: 12px;
            color: var(--text-dim);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
